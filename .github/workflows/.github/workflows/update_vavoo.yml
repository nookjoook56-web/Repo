import cloudscraper, urllib3, base64, json, unicodedata, os

TOKEN = os.getenv('MY_TOKEN')
USER = "nookjoook56-web"
REPO = "Repo" # Büyük/küçük harfe dikkat: Görüntüde 'Repo'
FILE = "playlist.m3u"
# KAYNAK OLARAK DOGRUDAN VAVOO API KULLANIYORUZ (Kendi dosyani degil!)
VAVOO_API = "https://vavoo.to/channels"

def temizle(m):
    if not m: return "Kanal"
    n = unicodedata.normalize('NFKD', str(m))
    return "".join([c for c in n if not unicodedata.combining(c)]).encode('ascii', 'ignore').decode('ascii')

s = cloudscraper.create_scraper()
h = urllib3.PoolManager()
headers = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}

try:
    # 1. Vavoo'dan taze imza al
    auth_res = s.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
    sig = auth_res.get('signed', '')
    
    # 2. Dogrudan Vavoo API'den güncel kanal listesini cek
    res = s.get(VAVOO_API, timeout=30)
    channels = res.json()
    
    out = ["#EXTM3U"]
    for ch in channels:
        n = temizle(ch.get("name"))
        i = ch.get("id")
        group = temizle(ch.get("country", "Genel"))
        # Linke imzayi ekliyoruz
        url = f"https://vavoo.to/play/{i}/index.m3u8?n=1&sig={sig}"
        out.append(f'#EXTINF:-1 group-title="{group}",{n}\n{url}')
    
    final_content = "\n".join(out)
    
    # 3. GitHub SHA al ve üzerine yaz (Döngüye girmemesi icin temiz içerik)
    api_url = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
    r_get = h.request('GET', api_url, headers=headers)
    sha = json.loads(r_get.data.decode('utf-8')).get("sha") if r_get.status == 200 else None
    
    payload = {
        "message": "Full Sync with Sig",
        "content": base64.b64encode(final_content.encode("utf-8")).decode("utf-8")
    }
    if sha: payload["sha"] = sha
    
    h.request('PUT', api_url, headers=headers, body=json.dumps(payload).encode("utf-8"))
    print("Islem Basarili: Liste sifirlandi ve imzali linkler eklendi.")

except Exception as e:
    print(f"Hata: {e}")
    
