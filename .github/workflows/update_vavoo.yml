name: Vavoo Final Fix

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install cloudscraper urllib3

      - name: Run Clean Sync
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python << END
          import cloudscraper, urllib3, base64, json, unicodedata, os
          
          TOKEN = os.getenv('MY_TOKEN')
          USER = "nookjoook56-web"
          REPO = "Repo" 
          FILE = "playlist.m3u"
          VAVOO_API = "https://vavoo.to/channels"

          def temiz(m):
              if not m: return "Kanal"
              n = unicodedata.normalize('NFKD', str(m))
              return "".join([c for c in n if not unicodedata.combining(c)]).encode('ascii', 'ignore').decode('ascii')

          s = cloudscraper.create_scraper()
          h = urllib3.PoolManager()
          headers = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}

          try:
              auth = s.post("https://vavoo.to/api/box/ping2", data={"veo": "1"}).json()
              sig = auth.get('signed', '')
              res = s.get(VAVOO_API, timeout=30)
              channels = res.json()
              out = ["#EXTM3U"]
              for ch in channels:
                  name = temiz(ch.get("name"))
                  cid = ch.get("id")
                  grp = temiz(ch.get("country", "Genel"))
                  url = f"https://vavoo.to/play/{cid}/index.m3u8?n=1&sig={sig}"
                  out.append(f'#EXTINF:-1 group-title="{grp}",{name}\n{url}')
              final = "\n".join(out)
              api = f"https://api.github.com/repos/{USER}/{REPO}/contents/{FILE}"
              r_g = h.request('GET', api, headers=headers)
              sha = json.loads(r_g.data.decode('utf-8')).get("sha") if r_g.status == 200 else None
              payload = {"message": "Re-creating workflow", "content": base64.b64encode(final.encode("utf-8")).decode("utf-8")}
              if sha: payload["sha"] = sha
              h.request('PUT', api, headers=headers, body=json.dumps(payload).encode("utf-8"))
              print("Basarili!")
          except Exception as e:
              print(f"Hata: {e}")
          END
          
